services:
  - type: web
    name: mtg-search-chile
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gthread --workers 1 --threads 4 --timeout 180 --graceful-timeout 30 app:app
    healthCheckPath: /health
    autoDeployTrigger: off
    envVars:
      - key: PRICE_TRACKER_INTERNAL_SECRET
        sync: false
