{% extends "base.html" %}
{% block title %}Iniciando sesión · MTG Search Chile{% endblock %}
{% block content %}<div class="card section-card auth-card"><div class="spinner-border auth-spinner mb-3" aria-hidden="true"></div><h1 class="h4">Completando inicio de sesión…</h1><p id="auth-status" class="text-secondary mb-0" role="status">Estamos validando tu cuenta de Google.</p></div>{% endblock %}
{% block scripts %}<script type="module">
const status = document.getElementById('auth-status'); const wait = () => new Promise(resolve => setTimeout(resolve, 100));
while (!window.mtgSupabase) await wait(); const {data, error} = await window.mtgSupabase.auth.getSession();
if (error || !data.session) { status.textContent = error?.message || 'No fue posible obtener la sesión.'; } else { try { await window.syncServerSession(data.session.access_token); location.replace({{ url_for('account')|tojson }}); } catch (e) { status.textContent = e.message; } }
</script>{% endblock %}
