{% extends "base.html" %}{% block title %}Wishlist{% endblock %}{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h1 class="h3">Wishlist</h1></div>
<form method="post" class="card card-body shadow-sm mb-4"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="row g-2"><div class="col-md-6"><input class="form-control" name="card_name" placeholder="Nombre de carta" required></div><div class="col-md-2"><input class="form-control" type="number" min="1" max="999" name="desired_quantity" value="1"></div><div class="col-md-3"><input class="form-control" name="notes" maxlength="1000" placeholder="Notas"></div><div class="col-md-1"><button class="btn btn-primary w-100">+</button></div></div></form>
<div class="list-group shadow-sm">{% for item in items %}<div class="list-group-item d-flex justify-content-between align-items-center {% if item.acquired %}text-decoration-line-through opacity-75{% endif %}"><div><strong>{{ item.card_name }}</strong> × {{ item.desired_quantity }}{% if item.notes %}<div class="small text-muted">{{ item.notes }}</div>{% endif %}</div><div class="d-flex gap-2"><a class="btn btn-sm btn-outline-primary" href="{{ url_for('inicio', cards='1x ' ~ item.card_name) }}">Buscar</a><form method="post" action="{{ url_for('update_wishlist_status', item_id=item.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input type="hidden" name="acquired" value="{{ 'false' if item.acquired else 'true' }}"><button class="btn btn-sm btn-outline-success">{{ 'Pendiente' if item.acquired else 'Marcar obtenida' }}</button></form><form method="post" action="{{ url_for('delete_wishlist', item_id=item.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-outline-danger">Eliminar</button></form></div></div>{% else %}<div class="list-group-item text-muted">Tu wishlist está vacía.</div>{% endfor %}</div>
{% endblock %}
