{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="flash-stack" aria-live="polite" aria-atomic="true">
    {% for category, message in messages %}
    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
      <i class="bi {% if category == 'success' %}bi-check-circle{% elif category == 'danger' %}bi-exclamation-octagon{% elif category == 'warning' %}bi-exclamation-triangle{% else %}bi-info-circle{% endif %}" aria-hidden="true"></i>
      <span>{{ message }}</span>
      <button class="btn-close" type="button" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>
    {% endfor %}
  </div>
  {% endif %}
{% endwith %}
