{% extends "base.html" %}{% block title %}Tiendas favoritas{% endblock %}{% block content %}
<h1 class="h3 mb-3">Tiendas favoritas</h1><div class="list-group shadow-sm">{% for favorite in favorites %}<div class="list-group-item d-flex justify-content-between align-items-center"><div><strong>{{ favorite.stores.name }}</strong><br><small>{{ favorite.stores.platform }}</small></div><form method="post" action="{{ url_for('delete_favorite', store_id=favorite.store_id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input type="hidden" name="next" value="{{ url_for('favorite_stores') }}"><button class="btn btn-sm btn-outline-danger">Quitar</button></form></div>{% else %}<div class="list-group-item text-muted">Aún no tienes tiendas favoritas.</div>{% endfor %}</div>
{% endblock %}
