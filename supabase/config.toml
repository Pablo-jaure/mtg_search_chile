project_id = "mtg-search-chile"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false
sql_paths = []

[auth]
enabled = true
site_url = "https://mtg-search-chile.onrender.com"
additional_redirect_urls = [
  "https://mtg-search-chile.onrender.com/auth/callback",
  "http://127.0.0.1:5000/auth/callback",
  "http://localhost:5000/auth/callback",
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[functions.wishlist-price-tracker]
verify_jwt = false
