name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m py_compile app.py supabase_store.py mtg_cotizador.py

      - name: Smoke test Flask app
        run: >-
          python -c "from app import app;
          response = app.test_client().get('/');
          assert response.status_code == 200;
          assert b'MTG Search Chile' in response.data;
          assert 'Encuentra tus cartas al mejor precio'.encode() in response.data"

      - name: Run tests
        run: python -m pytest -q

  rls:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase database
        run: supabase db start

      - name: Run RLS policy tests
        run: supabase test db --local supabase/tests/rls.sql

  edge:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check price tracker Edge Function
        run: deno check supabase/functions/wishlist-price-tracker/index.ts

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - test
      - rls
      - edge
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl --fail-with-body --request POST \
            --url "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            --data "{\"commitId\":\"${GITHUB_SHA}\"}"
